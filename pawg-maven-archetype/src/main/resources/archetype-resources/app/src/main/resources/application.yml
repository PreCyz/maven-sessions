server:
  port: 8081
  servlet:
    context-path: /${rootArtifactId}

spring:
  application:
    name: ${rootArtifactId}
  main:
    banner-mode: off

# spring-doc
application:
  springdoc:
    title: ${rootArtifactId} API
    description: ${applicationDescription} POC.
    version: ${version}
springdoc:
  show-actuator: false

management:
  endpoints:
    web:
      base-path: /mgm
      exposure:
        include: health,beans,logs,env
      path-mapping:
        health: status
  server:
    port: 8070